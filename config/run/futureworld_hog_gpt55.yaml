# Run: gpt-5.5 (core/llm path), FutureWorld hog question, knowledge-only.
# This is the run behind scripts/run_forecast_corellm.py (the gpt-5.5 vs glm-5 comparison).
agent:
  name: forecast_noskill
  profile: forecast
  llm: gpt_sub2api          # -> config/agent/llm/gpt_sub2api.yaml (gpt-5.5)
  tool: default
  toolset: no_tools         # enable switch: no tools (knowledge-only)
  overrides:
    date_constraint: "2026-06-14"      # as-of cutoff
run:
  input_data: data/futureworld/2026-06-15__question.jsonl
  output_dir: log/corellm/futureworld_hog_gpt55
  max_concurrent: 4
