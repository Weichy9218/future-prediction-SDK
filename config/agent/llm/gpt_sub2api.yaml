# gpt-5.5 via the haoxiang gpt_sub2api gateway (Responses API). Selected by `agent.llm: gpt_sub2api`.
# Credentials are indirect: *_env names point at .env vars, never literal secrets.
agent:
  client: gpt_sub2api
  client_args:
    model: gpt-5.5
    temperature: 0.2
    max_tokens: 8192
    reasoning_effort: medium
    api_key_env: GPT_sub2api_apikey
    base_url_env: GPT_sub2api_URL
