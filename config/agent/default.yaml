# Agent composition root (mirrors galaxy-selfevolve/config/agent/default.yaml).
# A run yaml selects llm + tool + profile by name; this file wires the defaults.
defaults:
  - profile: forecast
  - llm: gpt_sub2api          # default model backend (override per run)
  - tool: default             # toolsets + tool-llm routes
  - _self_

# global agent knobs (lean)
max_num_tool_calls: 8
max_llm_calling_trials: 3
